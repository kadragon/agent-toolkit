name: harness-check

on:
  pull_request:
    branches: [main]

jobs:
  line-endings:
    name: Executable line ending check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell and Python scripts use LF
        run: |
          python3 - <<'PY'
          import pathlib
          import subprocess
          import sys

          paths = subprocess.check_output(
              ["git", "-c", "core.quotePath=false", "ls-files", "--", "*.sh", "*.bash", "*.py"],
              text=True,
          ).splitlines()

          bad = []
          for raw_path in paths:
              try:
                  blob = subprocess.check_output(
                      ["git", "cat-file", "blob", f"HEAD:{raw_path}"]
                  )
              except (subprocess.CalledProcessError, OSError) as e:
                  print(f"WARNING: could not read blob {raw_path}: {e}", file=sys.stderr)
                  continue
              if b"\r" in blob:
                  bad.append(raw_path)

          if bad:
              print("ERROR: executable text files must use LF line endings:")
              for path in bad:
                  print(f"  {path}")
              print("Fix with .gitattributes and git add --renormalize.")
              sys.exit(1)

          print("OK: executable text files use LF line endings.")
          PY

  harness-drift:
    name: Plugin-root portability + capture-before-use check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scripts/ci/check_harness_drift.py
        run: python3 scripts/ci/check_harness_drift.py

  version-bump:
    name: Plugin version bump check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check dev version bumped
        run: |
          ver_gt() {
            local IFS=.
            read -r a1 a2 a3 <<< "$1"
            read -r b1 b2 b3 <<< "$2"
            [ "$a1" -gt "$b1" ] && return 0
            [ "$a1" -lt "$b1" ] && return 1
            [ "$a2" -gt "$b2" ] && return 0
            [ "$a2" -lt "$b2" ] && return 1
            [ "$a3" -gt "$b3" ]
          }
          CHANGED=$(git diff origin/main...HEAD -- dev/ | grep -c '^+\|^-' || true)
          if [ "$CHANGED" -gt 0 ]; then
            if ! git cat-file -e "origin/main:dev/.claude-plugin/plugin.json" 2>/dev/null; then
              echo "OK: dev/ is new or renamed on this branch (no manifest on origin/main) - skipping version-increment check."
              exit 0
            fi
            OLD_CLAUDE=$(git show origin/main:dev/.claude-plugin/plugin.json | jq -r .version)
            OLD_CODEX=$(git show origin/main:dev/.codex-plugin/plugin.json | jq -r .version)
            NEW_CLAUDE=$(jq -r .version dev/.claude-plugin/plugin.json)
            NEW_CODEX=$(jq -r .version dev/.codex-plugin/plugin.json)
            for v in OLD_CLAUDE OLD_CODEX NEW_CLAUDE NEW_CODEX; do
              eval "val=\$$v"
              [ "$val" = "null" ] && { echo "ERROR: dev $v version key missing in manifest."; exit 1; }
            done
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ] && [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: dev/ changed but neither manifest bumped ($NEW_CLAUDE)."
              echo "See docs/conventions.md for semver rules."
              exit 1
            fi
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ]; then
              echo "ERROR: dev Codex bumped ($OLD_CODEX->$NEW_CODEX) but Claude manifest not ($NEW_CLAUDE). Bump both in sync."
              exit 1
            fi
            if [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: dev Claude bumped ($OLD_CLAUDE->$NEW_CLAUDE) but Codex manifest not ($NEW_CODEX). Bump both in sync."
              exit 1
            fi
            if [ "$NEW_CLAUDE" != "$NEW_CODEX" ]; then
              echo "ERROR: dev manifests out of sync: .claude-plugin ($NEW_CLAUDE) != .codex-plugin ($NEW_CODEX)."
              exit 1
            fi
            if ! ver_gt "$NEW_CLAUDE" "$OLD_CLAUDE"; then
              echo "ERROR: dev version did not increase ($OLD_CLAUDE -> $NEW_CLAUDE). Bumps must be a strict SemVer increment."
              exit 1
            fi
            echo "OK: dev version bumped ($OLD_CLAUDE -> $NEW_CLAUDE), both manifests in sync."
          else
            echo "SKIP: dev/ not changed."
          fi

      - name: Check prod version bumped
        run: |
          ver_gt() {
            local IFS=.
            read -r a1 a2 a3 <<< "$1"
            read -r b1 b2 b3 <<< "$2"
            [ "$a1" -gt "$b1" ] && return 0
            [ "$a1" -lt "$b1" ] && return 1
            [ "$a2" -gt "$b2" ] && return 0
            [ "$a2" -lt "$b2" ] && return 1
            [ "$a3" -gt "$b3" ]
          }
          CHANGED=$(git diff origin/main...HEAD -- prod/ | grep -c '^+\|^-' || true)
          if [ "$CHANGED" -gt 0 ]; then
            if ! git cat-file -e "origin/main:prod/.claude-plugin/plugin.json" 2>/dev/null; then
              echo "OK: prod/ is new or renamed on this branch (no manifest on origin/main) - skipping version-increment check."
              exit 0
            fi
            OLD_CLAUDE=$(git show origin/main:prod/.claude-plugin/plugin.json | jq -r .version)
            OLD_CODEX=$(git show origin/main:prod/.codex-plugin/plugin.json | jq -r .version)
            NEW_CLAUDE=$(jq -r .version prod/.claude-plugin/plugin.json)
            NEW_CODEX=$(jq -r .version prod/.codex-plugin/plugin.json)
            for v in OLD_CLAUDE OLD_CODEX NEW_CLAUDE NEW_CODEX; do
              eval "val=\$$v"
              [ "$val" = "null" ] && { echo "ERROR: prod $v version key missing in manifest."; exit 1; }
            done
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ] && [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: prod/ changed but neither manifest bumped ($NEW_CLAUDE)."
              echo "See docs/conventions.md for semver rules."
              exit 1
            fi
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ]; then
              echo "ERROR: prod Codex bumped ($OLD_CODEX->$NEW_CODEX) but Claude manifest not ($NEW_CLAUDE). Bump both in sync."
              exit 1
            fi
            if [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: prod Claude bumped ($OLD_CLAUDE->$NEW_CLAUDE) but Codex manifest not ($NEW_CODEX). Bump both in sync."
              exit 1
            fi
            if [ "$NEW_CLAUDE" != "$NEW_CODEX" ]; then
              echo "ERROR: prod manifests out of sync: .claude-plugin ($NEW_CLAUDE) != .codex-plugin ($NEW_CODEX)."
              exit 1
            fi
            if ! ver_gt "$NEW_CLAUDE" "$OLD_CLAUDE"; then
              echo "ERROR: prod version did not increase ($OLD_CLAUDE -> $NEW_CLAUDE). Bumps must be a strict SemVer increment."
              exit 1
            fi
            echo "OK: prod version bumped ($OLD_CLAUDE -> $NEW_CLAUDE), both manifests in sync."
          else
            echo "SKIP: prod/ not changed."
          fi

      - name: Check team-standards version bumped
        run: |
          ver_gt() {
            local IFS=.
            read -r a1 a2 a3 <<< "$1"
            read -r b1 b2 b3 <<< "$2"
            [ "$a1" -gt "$b1" ] && return 0
            [ "$a1" -lt "$b1" ] && return 1
            [ "$a2" -gt "$b2" ] && return 0
            [ "$a2" -lt "$b2" ] && return 1
            [ "$a3" -gt "$b3" ]
          }
          CHANGED=$(git diff origin/main...HEAD -- team-standards/ | grep -c '^+\|^-' || true)
          if [ "$CHANGED" -gt 0 ]; then
            OLD_CLAUDE=$(git show origin/main:team-standards/.claude-plugin/plugin.json | jq -r .version)
            OLD_CODEX=$(git show origin/main:team-standards/.codex-plugin/plugin.json | jq -r .version)
            NEW_CLAUDE=$(jq -r .version team-standards/.claude-plugin/plugin.json)
            NEW_CODEX=$(jq -r .version team-standards/.codex-plugin/plugin.json)
            for v in OLD_CLAUDE OLD_CODEX NEW_CLAUDE NEW_CODEX; do
              eval "val=\$$v"
              [ "$val" = "null" ] && { echo "ERROR: team-standards $v version key missing in manifest."; exit 1; }
            done
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ] && [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: team-standards/ changed but neither manifest bumped ($NEW_CLAUDE)."
              echo "See docs/conventions.md for semver rules."
              exit 1
            fi
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ]; then
              echo "ERROR: team-standards Codex bumped ($OLD_CODEX->$NEW_CODEX) but Claude manifest not ($NEW_CLAUDE). Bump both in sync."
              exit 1
            fi
            if [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: team-standards Claude bumped ($OLD_CLAUDE->$NEW_CLAUDE) but Codex manifest not ($NEW_CODEX). Bump both in sync."
              exit 1
            fi
            if [ "$NEW_CLAUDE" != "$NEW_CODEX" ]; then
              echo "ERROR: team-standards manifests out of sync: .claude-plugin ($NEW_CLAUDE) != .codex-plugin ($NEW_CODEX)."
              exit 1
            fi
            if ! ver_gt "$NEW_CLAUDE" "$OLD_CLAUDE"; then
              echo "ERROR: team-standards version did not increase ($OLD_CLAUDE -> $NEW_CLAUDE). Bumps must be a strict SemVer increment."
              exit 1
            fi
            echo "OK: team-standards version bumped ($OLD_CLAUDE -> $NEW_CLAUDE), both manifests in sync."
          else
            echo "SKIP: team-standards/ not changed."
          fi
