name: harness-check

on:
  pull_request:
    branches: [main]

jobs:
  line-endings:
    name: Executable line ending check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell and Python scripts use LF
        run: |
          python3 - <<'PY'
          import pathlib
          import subprocess
          import sys

          paths = subprocess.check_output(
              ["git", "-c", "core.quotePath=false", "ls-files", "--", "*.sh", "*.bash", "*.py"],
              text=True,
          ).splitlines()

          bad = []
          for raw_path in paths:
              try:
                  blob = subprocess.check_output(
                      ["git", "cat-file", "blob", f"HEAD:{raw_path}"]
                  )
              except (subprocess.CalledProcessError, OSError) as e:
                  print(f"WARNING: could not read blob {raw_path}: {e}", file=sys.stderr)
                  continue
              if b"\r" in blob:
                  bad.append(raw_path)

          if bad:
              print("ERROR: executable text files must use LF line endings:")
              for path in bad:
                  print(f"  {path}")
              print("Fix with .gitattributes and git add --renormalize.")
              sys.exit(1)

          print("OK: executable text files use LF line endings.")
          PY

  version-bump:
    name: Plugin version bump check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check dev-tools version bumped
        run: |
          CHANGED=$(git diff origin/main...HEAD -- dev-tools/ | grep -c '^+\|^-' || true)
          if [ "$CHANGED" -gt 0 ]; then
            OLD_CLAUDE=$(git show origin/main:dev-tools/.claude-plugin/plugin.json | jq -r .version)
            OLD_CODEX=$(git show origin/main:dev-tools/.codex-plugin/plugin.json | jq -r .version)
            NEW_CLAUDE=$(jq -r .version dev-tools/.claude-plugin/plugin.json)
            NEW_CODEX=$(jq -r .version dev-tools/.codex-plugin/plugin.json)
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ] && [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: dev-tools/ changed but neither manifest bumped ($NEW_CLAUDE)."
              echo "See docs/conventions.md for semver rules."
              exit 1
            fi
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ]; then
              echo "ERROR: dev-tools Codex bumped ($OLD_CODEX->$NEW_CODEX) but Claude manifest not ($NEW_CLAUDE). Bump both in sync."
              exit 1
            fi
            if [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: dev-tools Claude bumped ($OLD_CLAUDE->$NEW_CLAUDE) but Codex manifest not ($NEW_CODEX). Bump both in sync."
              exit 1
            fi
            if [ "$NEW_CLAUDE" != "$NEW_CODEX" ]; then
              echo "ERROR: dev-tools manifests out of sync: .claude-plugin ($NEW_CLAUDE) != .codex-plugin ($NEW_CODEX)."
              exit 1
            fi
            echo "OK: dev-tools version bumped ($OLD_CLAUDE -> $NEW_CLAUDE), both manifests in sync."
          else
            echo "SKIP: dev-tools/ not changed."
          fi

      - name: Check productivity version bumped
        run: |
          CHANGED=$(git diff origin/main...HEAD -- productivity/ | grep -c '^+\|^-' || true)
          if [ "$CHANGED" -gt 0 ]; then
            OLD_CLAUDE=$(git show origin/main:productivity/.claude-plugin/plugin.json | jq -r .version)
            OLD_CODEX=$(git show origin/main:productivity/.codex-plugin/plugin.json | jq -r .version)
            NEW_CLAUDE=$(jq -r .version productivity/.claude-plugin/plugin.json)
            NEW_CODEX=$(jq -r .version productivity/.codex-plugin/plugin.json)
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ] && [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: productivity/ changed but neither manifest bumped ($NEW_CLAUDE)."
              echo "See docs/conventions.md for semver rules."
              exit 1
            fi
            if [ "$OLD_CLAUDE" = "$NEW_CLAUDE" ]; then
              echo "ERROR: productivity Codex bumped ($OLD_CODEX->$NEW_CODEX) but Claude manifest not ($NEW_CLAUDE). Bump both in sync."
              exit 1
            fi
            if [ "$OLD_CODEX" = "$NEW_CODEX" ]; then
              echo "ERROR: productivity Claude bumped ($OLD_CLAUDE->$NEW_CLAUDE) but Codex manifest not ($NEW_CODEX). Bump both in sync."
              exit 1
            fi
            if [ "$NEW_CLAUDE" != "$NEW_CODEX" ]; then
              echo "ERROR: productivity manifests out of sync: .claude-plugin ($NEW_CLAUDE) != .codex-plugin ($NEW_CODEX)."
              exit 1
            fi
            echo "OK: productivity version bumped ($OLD_CLAUDE -> $NEW_CLAUDE), both manifests in sync."
          else
            echo "SKIP: productivity/ not changed."
          fi
